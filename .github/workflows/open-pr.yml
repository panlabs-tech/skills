name: open-pr
on: workflow_dispatch
permissions:
  contents: write
  pull-requests: write
jobs:
  open:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: create branch, commit and PR as bot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b test/bot-pr-$GITHUB_RUN_ID
          echo "run $GITHUB_RUN_ID" > .bot-test
          git add .bot-test
          git commit -m "test: commit local nao assinado feito pelo bot"
          git push origin HEAD
          gh pr create --base main --head test/bot-pr-$GITHUB_RUN_ID \
            --title "test: PR aberto pelo github-actions[bot]" --body "research #64"
